<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轉入生教科書價錢查詢與紀錄</title>
  <!-- 載入 Vue 3 和 Tailwind CSS -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 Google 登入 API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* 全站基礎大字體設定 */
    html { font-size: 20px; }
    body { font-size: 1rem; } 
    /* 自訂選取方塊顏色，依比例放大 */
    .custom-checkbox { width: 1.5rem; height: 1.5rem; accent-color: #059669; cursor: pointer; }
    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen p-2 md:p-4 font-sans text-gray-800 tracking-wide">
  <div id="app" v-cloak class="max-w-5xl mx-auto">
    
    <!-- 提示訊息 Modal/Toast -->
    <div v-if="toast.show" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 px-6 py-4 rounded shadow-xl text-white font-bold transition-all text-[20px]"
         :class="toast.type === 'success' ? 'bg-green-600' : 'bg-red-600'">
      {{ toast.message }}
    </div>

    <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
      
      <!-- 標題與登出列 -->
      <div class="bg-emerald-700 text-white p-5 flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-[26px] font-bold tracking-wide">教科書價錢查詢與紀錄系統</h1>
        <div v-if="isAuthenticated" class="flex items-center gap-3">
          <span class="text-[18px] opacity-90">{{ userEmail }}</span>
          <button @click="logout" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold text-[18px] transition">登出</button>
        </div>
      </div>

      <div class="p-4 md:p-6">
        
        <!-- ================= 載入/驗證狀態 ================= -->
        <div v-if="authLoading" class="text-center py-20">
          <div class="animate-spin inline-block w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full mb-4"></div>
          <p class="text-[22px] font-bold text-gray-600">系統載入與身分驗證中...</p>
        </div>

        <!-- ================= 登入畫面 ================= -->
        <div v-else-if="!isAuthenticated" class="max-w-md mx-auto bg-slate-100 p-8 rounded-xl border border-slate-200 text-center my-10">
          <h2 class="text-[28px] font-bold mb-4 text-emerald-800">人員登入</h2>
          <p class="mb-8 text-[20px] text-gray-600">請使用已授權於白名單的 Google 帳號登入系統</p>
          <!-- Google 登入按鈕容器 -->
          <div id="google-button-container" class="flex justify-center min-h-[50px]"></div>
        </div>

        <!-- ================= 系統主要內容 ================= -->
        <div v-else>
          
          <!-- 學生資訊區 -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 bg-slate-100 p-5 rounded-lg border border-slate-200">
            <div>
              <label class="block text-[20px] font-bold text-gray-700 mb-2">年級</label>
              <select v-model="form.grade" @change="handleGradeChange" class="w-full border-gray-300 rounded p-3 border focus:ring-emerald-500 focus:border-emerald-500 text-[20px]">
                <option value="7">七年級</option>
                <option value="8">八年級</option>
                <option value="9">九年級</option>
              </select>
            </div>
            <div>
              <label class="block text-[20px] font-bold text-gray-700 mb-2">班級 (例: 701)</label>
              <input type="text" v-model="form.className" class="w-full border-gray-300 rounded p-3 border focus:ring-emerald-500 focus:border-emerald-500 text-[20px]" placeholder="輸入班級">
            </div>
            <div>
              <label class="block text-[20px] font-bold text-gray-700 mb-2">座號</label>
              <input type="number" v-model="form.seatNo" class="w-full border-gray-300 rounded p-3 border focus:ring-emerald-500 focus:border-emerald-500 text-[20px]" placeholder="輸入座號">
            </div>
            <div>
              <label class="block text-[20px] font-bold text-gray-700 mb-2">姓名</label>
              <input type="text" v-model="form.name" class="w-full border-gray-300 rounded p-3 border focus:ring-emerald-500 focus:border-emerald-500 text-[20px]" placeholder="輸入姓名">
            </div>
          </div>

          <!-- 按鈕操作區 -->
          <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-4 gap-4">
            <h2 class="text-[24px] font-bold text-gray-800 border-l-4 border-emerald-500 pl-3">購書清單</h2>
            <div class="flex space-x-3 w-full md:w-auto">
              <button @click="selectAll" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded text-[20px] font-bold transition shadow">全選</button>
              <button @click="deselectAll" class="flex-1 md:flex-none bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded text-[20px] font-bold transition shadow">全部取消</button>
            </div>
          </div>

          <!-- 書單表格 (為手機保留滾動) -->
          <div class="overflow-x-auto border rounded-lg mb-8 shadow-sm">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-emerald-100">
                <tr>
                  <th class="px-3 py-4 text-left font-bold text-gray-800 w-20 text-center text-[20px]">勾選</th>
                  <th class="px-4 py-4 text-left font-bold text-gray-800 text-[20px]">科目 / 書名</th>
                  <th class="px-4 py-4 text-left font-bold text-gray-800 text-[20px] w-1/4">出版社</th>
                  <th class="px-4 py-4 text-right font-bold text-gray-800 text-[20px] w-28">單價</th>
                </tr>
              </thead>
              <tbody class="bg-white divide-y divide-gray-200">
                <tr v-if="isLoading" class="text-center">
                  <td colspan="4" class="px-4 py-10 text-gray-500 font-bold text-[20px]">書單資料載入中...</td>
                </tr>
                <tr v-else-if="filteredBooks.length === 0" class="text-center">
                  <td colspan="4" class="px-4 py-10 text-gray-500 font-bold text-[20px]">該年級目前無書單資料</td>
                </tr>
                <tr v-for="(book, index) in filteredBooks" :key="book.id" 
                    class="hover:bg-emerald-50 transition cursor-pointer"
                    @click="toggleSelection(book.id)">
                  <td class="px-3 py-4 text-center" @click.stop>
                    <input type="checkbox" v-model="selectedBooks[book.id]" class="custom-checkbox">
                  </td>
                  <td class="px-4 py-4 font-bold text-gray-800 text-[22px]">{{ book.subject }}</td>
                  <td class="px-4 py-4 text-gray-600">
                    <span class="px-3 py-1 bg-gray-100 border border-gray-200 rounded text-[18px]">{{ book.publisher }}</span>
                  </td>
                  <td class="px-4 py-4 text-right font-bold text-emerald-600 text-[22px]">{{ book.price }}</td>
                </tr>
              </tbody>
              <tfoot class="bg-emerald-50 border-t-2 border-emerald-300">
                <tr>
                  <td colspan="3" class="px-4 py-5 text-right font-bold text-gray-800 text-[24px]">金額總計：</td>
                  <td class="px-4 py-5 text-right font-black text-red-600 text-[28px]">{{ totalPrice }}</td>
                </tr>
              </tfoot>
            </table>
          </div>

          <!-- 紀錄專用選項區 -->
          <div class="bg-yellow-50 p-5 rounded-lg border border-yellow-300 mb-8 shadow-sm">
            <h2 class="text-[24px] font-bold text-gray-800 border-l-4 border-yellow-500 pl-3 mb-5">紀錄與備註</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-[20px] font-bold text-gray-700 mb-2">是否改單狀態 <span class="text-red-500">*</span></label>
                <select v-model="form.statusOption" class="w-full border-gray-300 rounded p-3 border focus:ring-yellow-500 focus:border-yellow-500 text-[20px]">
                  <option disabled value="">-- 請選擇狀態 --</option>
                  <option value="1. 他校轉入，買部分，未註冊，須改單">1. 他校轉入，買部分，未註冊，須改單</option>
                  <option value="2. 他校轉入，買全部，未註冊，不須改單">2. 他校轉入，買全部，未註冊，不須改單</option>
                  <option value="3. 轉出他校，已簽名，未註冊，出納繳費">3. 轉出他校，已簽名，未註冊，出納繳費</option>
                  <option value="4. 其他">4. 其他</option>
                </select>
              </div>
              <div>
                <label class="block text-[20px] font-bold text-gray-700 mb-2">備註</label>
                <textarea v-model="form.notes" rows="2" class="w-full border-gray-300 rounded p-3 border focus:ring-yellow-500 focus:border-yellow-500 text-[20px]" placeholder="輸入其他備註事項..."></textarea>
              </div>
            </div>
          </div>

          <!-- 提交按鈕 -->
          <div class="text-center pb-6">
            <button @click="submitRecord" 
                    :disabled="isSubmitting"
                    class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-300 text-white font-bold py-4 px-12 rounded-lg shadow-lg transition text-[24px] w-full md:w-auto">
              <span v-if="isSubmitting">提交儲存中...</span>
              <span v-else>確認並寫入紀錄</span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue;

    createApp({
      setup() {
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyMHbuQznJV0e9GHn94SEWr0XoPRIgPFrOg9OqPUK100bB_cuB7VN6Ep3rG692AFWtPOQ/exec'; 
        const GOOGLE_CLIENT_ID = '553016940521-araovlp30ctbqn6um5rr49q3es5jm4jg.apps.googleusercontent.com';
        
        // 認證相關狀態
        const isAuthenticated = ref(false);
        const userEmail = ref('');
        const authLoading = ref(true);

        const allBooks = ref([]);
        const isLoading = ref(true);
        const isSubmitting = ref(false);
        const selectedBooks = ref({});
        const toast = reactive({ show: false, message: '', type: 'success' });

        const form = reactive({
          grade: '7',
          className: '',
          seatNo: '',
          name: '',
          statusOption: '',
          notes: ''
        });

        // 顯示提示訊息
        const showToast = (message, type = 'success') => {
          toast.message = message;
          toast.type = type;
          toast.show = true;
          setTimeout(() => { toast.show = false; }, 4000);
        };

        // --- Google 登入與白名單驗證邏輯 ---
        
        // 解析 Google 回傳的 JWT Token 取得 Email
        const decodeJwtResponse = (token) => {
          let base64Url = token.split('.')[1];
          let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          }).join(''));
          return JSON.parse(jsonPayload);
        };

        // 後端驗證白名單
        const verifyWhitelist = async (email) => {
          authLoading.value = true;
          try {
            const response = await fetch(`${GAS_WEB_APP_URL}?action=checkAuth&email=${encodeURIComponent(email)}`);
            const result = await response.json();
            
            if (result.status === 'success' && result.isAllowed) {
              isAuthenticated.value = true;
              userEmail.value = email;
              localStorage.setItem('textbookSys_userEmail', email); // 登入記憶
              showToast(`歡迎回來，${email}`);
              fetchBooks(); // 驗證成功後載入書單
            } else {
              showToast('登入失敗：您的 Google 帳號不在授權的白名單內', 'error');
              logout();
            }
          } catch (error) {
            showToast('網路錯誤，無法驗證白名單', 'error');
            logout();
          } finally {
            authLoading.value = false;
          }
        };

        // 處理 Google 登入按鈕的回呼
        window.handleCredentialResponse = async (response) => {
          const payload = decodeJwtResponse(response.credential);
          if(payload.email) {
            await verifyWhitelist(payload.email);
          }
        };

        // 渲染 Google 登入按鈕
        const renderGoogleButton = () => {
          if (window.google && window.google.accounts) {
            window.google.accounts.id.initialize({
              client_id: GOOGLE_CLIENT_ID,
              callback: window.handleCredentialResponse
            });
            window.google.accounts.id.renderButton(
              document.getElementById("google-button-container"),
              { theme: "outline", size: "large", type: "standard", shape: "rectangular" }
            );
          } else {
            // 如果 SDK 還沒載入完，延遲重試
            setTimeout(renderGoogleButton, 200);
          }
        };

        // 登出
        const logout = () => {
          isAuthenticated.value = false;
          userEmail.value = '';
          localStorage.removeItem('textbookSys_userEmail');
          setTimeout(() => { renderGoogleButton(); }, 100);
        };

        // --- 書單系統邏輯 ---

        // 載入書單資料
        const fetchBooks = async () => {
          isLoading.value = true;
          try {
            const response = await fetch(`${GAS_WEB_APP_URL}?action=getBooks`);
            const result = await response.json();
            if (result.status === 'success') {
              allBooks.value = result.data;
            } else {
              showToast('書單載入失敗：' + result.message, 'error');
            }
          } catch (error) {
            showToast('書單資料網路連線發生錯誤', 'error');
          } finally {
            isLoading.value = false;
          }
        };

        // 計算當前年級可見的書單
        const filteredBooks = computed(() => {
          return allBooks.value.filter(b => b.grade === form.grade);
        });

        // 計算勾選的總金額
        const totalPrice = computed(() => {
          let sum = 0;
          filteredBooks.value.forEach(book => {
            if (selectedBooks.value[book.id]) {
              sum += book.price;
            }
          });
          return sum;
        });

        const handleGradeChange = () => { selectedBooks.value = {}; };
        const toggleSelection = (id) => { selectedBooks.value[id] = !selectedBooks.value[id]; };
        const selectAll = () => { filteredBooks.value.forEach(book => { selectedBooks.value[book.id] = true; }); };
        const deselectAll = () => { filteredBooks.value.forEach(book => { selectedBooks.value[book.id] = false; }); };

        // 送出資料
        const submitRecord = async () => {
          if (!form.className || !form.name || !form.statusOption) {
            showToast('請確實填寫「班級」、「姓名」與「是否改單狀態」！', 'error');
            return;
          }

          const checkedItems = filteredBooks.value.filter(b => selectedBooks.value[b.id]);
          let purchasedItemsStr = "";
          if (checkedItems.length === 0) { purchasedItemsStr = "未購買"; } 
          else if (checkedItems.length === filteredBooks.value.length) { purchasedItemsStr = "全買"; } 
          else { purchasedItemsStr = checkedItems.map(b => b.subject).join(", "); }

          const payload = {
            userEmail: userEmail.value, // 加入紀錄者信箱
            className: form.className,
            name: form.name,
            seatNo: form.seatNo,
            totalPrice: totalPrice.value,
            purchasedItems: purchasedItemsStr,
            statusOption: form.statusOption,
            notes: form.notes
          };

          isSubmitting.value = true;
          
          try {
            const response = await fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });
            const result = await response.json();
            
            if (result.status === 'success') {
              showToast('✅ 紀錄已成功寫入 Google 試算表！');
              form.className = '';
              form.seatNo = '';
              form.name = '';
              form.statusOption = '';
              form.notes = '';
              deselectAll();
            } else {
              showToast('❌ 寫入失敗：' + result.message, 'error');
            }
          } catch (error) {
            showToast('❌ 發生錯誤，無法連接至伺服器', 'error');
          } finally {
            isSubmitting.value = false;
          }
        };

        // 系統初始化
        onMounted(() => {
          // 檢查是否有登入記憶
          const savedEmail = localStorage.getItem('textbookSys_userEmail');
          if (savedEmail) {
            verifyWhitelist(savedEmail);
          } else {
            authLoading.value = false;
            // 稍等 DOM 渲染後掛載 Google 按鈕
            setTimeout(() => { renderGoogleButton(); }, 100);
          }
        });

        return {
          isAuthenticated, userEmail, authLoading, logout,
          allBooks, isLoading, isSubmitting, selectedBooks, form, toast, filteredBooks, totalPrice,
          handleGradeChange, toggleSelection, selectAll, deselectAll, submitRecord
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
